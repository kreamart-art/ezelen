server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
  gzip_min_length 1024;

  # The service worker + its registration must never be cached, so updates roll out.
  location = /sw.js { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
  location = /registerSW.js { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

  # Fingerprinted build assets can be cached hard.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
